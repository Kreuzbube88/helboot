name: ubuntu
display_name: "Ubuntu"
family: debian
capabilities:
  iso: true
  unattended_install: true
  pxe: true
  http_boot: true
  usb_boot: true
  secure_boot: true
answer_file:
  format: autoinstall.yaml
  template: templates/autoinstall.yaml.tmpl
settings_schema:
  - key: Locale
    type: string
    label: "Locale"
    group: localization
    default: "en_US.UTF-8"
    required: true
  - key: Keyboard
    type: string
    label: "Keyboard layout"
    group: localization
    default: "us"
    required: true
  - key: Timezone
    type: string
    label: "Timezone"
    group: localization
    default: "Etc/UTC"
    required: true
    placeholder: "Europe/Berlin"
  - key: Hostname
    type: string
    label: "Hostname"
    group: network
    help: "Leave empty to use the hostname from the host entry."
  - key: Username
    type: string
    label: "Username"
    group: users
    required: true
  - key: PasswordHash
    type: password
    label: "Password hash"
    group: users
    required: true
    help: "Crypted hash, e.g. from: mkpasswd -m sha-512"
  - key: SSHAllowPassword
    type: bool
    label: "Allow SSH password login"
    group: users
    default: true
  - key: StorageLayout
    type: select
    label: "Storage layout"
    group: storage
    default: "lvm"
    required: true
    options: [lvm, direct, zfs]
  - key: Packages
    type: list
    label: "Additional packages"
    group: packages
  - key: LateCommands
    type: list
    label: "Late commands"
    group: scripts
    help: "Shell commands run at the end of the installation."
detection:
  volume_id_patterns: ["Ubuntu*", "Ubuntu-Server*"]
  files: [".disk/info", "casper"]
boot:
  pxe:
    kernel: casper/vmlinuz
    initrd: [casper/initrd]
    cmdline: "ip=dhcp url={{ .ISOURL }} autoinstall ds=nocloud-net;s={{ .CloudInitURL }}"
  http_boot:
    kernel: casper/vmlinuz
    initrd: [casper/initrd]
    cmdline: "ip=dhcp url={{ .ISOURL }} autoinstall ds=nocloud-net;s={{ .CloudInitURL }}"
notes: >
  Uses subiquity autoinstall with a cloud-init NoCloud datasource served
  by HELBOOT (user-data/meta-data). The live installer fetches the whole
  ISO over HTTP, so PXE installs need ~2 GB of RAM on the target.
