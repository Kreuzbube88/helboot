name: fedora
display_name: "Fedora"
family: rhel
capabilities:
  iso: true
  unattended_install: true
  pxe: true
  http_boot: true
  usb_boot: true
  secure_boot: true
answer_file:
  format: kickstart
  template: templates/kickstart.ks.tmpl
settings_schema:
  - key: Locale
    type: string
    label: "Locale"
    group: localization
    default: "en_US.UTF-8"
    required: true
  - key: Keyboard
    type: string
    label: "Keyboard layout"
    group: localization
    default: "us"
    required: true
  - key: Timezone
    type: string
    label: "Timezone"
    group: localization
    default: "Etc/UTC"
    required: true
    placeholder: "Europe/Berlin"
  - key: Hostname
    type: string
    label: "Hostname"
    group: network
    help: "Leave empty to use the hostname from the host entry."
  - key: Username
    type: string
    label: "Username"
    group: users
    required: true
  - key: PasswordHash
    type: password
    label: "Password hash"
    group: users
    required: true
    help: "Crypted hash, e.g. from: mkpasswd -m sha-512"
  - key: PartitionType
    type: select
    label: "Partitioning type"
    group: storage
    default: "lvm"
    required: true
    options: [lvm, plain, btrfs, thinp]
  - key: Packages
    type: list
    label: "Additional packages"
    group: packages
  - key: PostScript
    type: text
    label: "Post-install script"
    group: scripts
    help: "Shell script run in the %post phase."
detection:
  volume_id_patterns: ["Fedora-*"]
  files: [".discinfo", "images/pxeboot/vmlinuz"]
boot:
  pxe:
    kernel: images/pxeboot/vmlinuz
    initrd: [images/pxeboot/initrd.img]
    cmdline: "inst.repo={{ .ISOURL }} inst.ks={{ .AnswerFileURL }}"
  http_boot:
    kernel: images/pxeboot/vmlinuz
    initrd: [images/pxeboot/initrd.img]
    cmdline: "inst.repo={{ .ISOURL }} inst.ks={{ .AnswerFileURL }}"
notes: >
  Anaconda kickstart installation; Server and Everything ISOs work best
  for network installs. Workstation Live ISOs have limited kickstart
  support and are flagged during ISO analysis.
