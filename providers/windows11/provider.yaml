name: windows11
display_name: "Windows 11"
family: windows
capabilities:
  iso: true
  unattended_install: true
  pxe: true
  http_boot: true
  usb_boot: true
  secure_boot: true
answer_file:
  format: autounattend.xml
  template: templates/autounattend.xml.tmpl
settings_schema:
  - key: Language
    type: string
    label: "Language"
    group: localization
    default: "en-US"
    required: true
    help: "Windows language tag, e.g. en-US or de-DE."
  - key: Keyboard
    type: string
    label: "Keyboard layout"
    group: localization
    default: "en-US"
    required: true
    help: "Input locale, e.g. de-DE or 0407:00000407."
  - key: Hostname
    type: string
    label: "Hostname"
    group: network
    help: "Leave empty to use the hostname from the host entry."
  - key: Username
    type: string
    label: "Administrator account name"
    group: users
    required: true
  - key: Password
    type: password
    label: "Account password"
    group: users
    required: true
    help: "Stored and embedded in the answer file as plain text."
  - key: ProductKey
    type: string
    label: "Product key"
    group: install
    help: "Leave empty to install without a key."
  - key: ImageIndex
    type: int
    label: "Image index"
    group: install
    default: 1
    required: true
    min: 1
    help: "Edition index inside install.wim/install.esd."
  - key: BypassHardwareChecks
    type: bool
    label: "Bypass hardware checks"
    group: install
    default: false
    help: "Disables the TPM 2.0 / Secure Boot / RAM checks for lab hardware."
detection:
  volume_id_patterns: ["CCCOMA_X64FRE*", "CPBA_X64FRE*"]
  # appraiserres.dll is the Windows 11 setup hardware/TPM compatibility
  # check DLL; it distinguishes Win11 media from Win10 media that share
  # the same CCCOMA_X64FRE* volume label.
  files: ["sources/install.wim", "sources/boot.wim", "sources/appraiserres.dll"]
boot:
  pxe:
    kernel: wimboot
    initrd:
      - "boot/bcd=BCD"
      - "boot/boot.sdi"
      - "sources/boot.wim"
    requires: [winpe]
  http_boot:
    kernel: wimboot
    initrd:
      - "boot/bcd=BCD"
      - "boot/boot.sdi"
      - "sources/boot.wim"
    requires: [winpe]
notes: >
  TPM 2.0 / Secure Boot / RAM hardware checks can be bypassed for lab
  hardware via registry keys in the generated autounattend.xml (profile
  option), matching common homelab practice.
