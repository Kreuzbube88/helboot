name: dietpi
display_name: "DietPi"
family: appliance
capabilities:
  iso: false
  image: true
  unattended_install: true
  pxe: false
  http_boot: false
  usb_boot: false
  secure_boot: false
answer_file:
  format: dietpi.txt
  template: templates/dietpi.txt.tmpl
settings_schema:
  - key: Locale
    type: string
    label: "Locale"
    group: localization
    default: "en_GB.UTF-8"
    required: true
  - key: Keyboard
    type: string
    label: "Keyboard layout"
    group: localization
    default: "gb"
    required: true
  - key: Timezone
    type: string
    label: "Timezone"
    group: localization
    default: "Etc/UTC"
    required: true
    placeholder: "Europe/Berlin"
  - key: Hostname
    type: string
    label: "Hostname"
    group: network
    help: "Leave empty to use the hostname from the host entry."
  - key: Password
    type: password
    label: "Global password"
    group: users
    required: true
    help: "Stored and embedded in dietpi.txt as plain text."
  - key: SoftwareIDs
    type: string
    label: "Software IDs"
    group: packages
    help: "Comma-separated DietPi software IDs to install."
detection:
  files: ["boot/dietpi.txt", "boot/dietpi"]
notes: >
  DietPi ships as ready-made disk images (not installer ISOs) that are
  written to the target medium; automation happens through dietpi.txt
  first-boot configuration injected next to the image. HELBOOT v1
  generates the dietpi.txt from a profile; direct image deployment to
  disks/SD cards is a documented follow-up (image-write capability).
