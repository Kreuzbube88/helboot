name: opensuse
display_name: "openSUSE"
family: suse
capabilities:
  iso: true
  unattended_install: true
  pxe: true
  http_boot: true
  usb_boot: true
  secure_boot: true
answer_file:
  format: autoyast
  template: templates/autoyast.xml.tmpl
settings_schema:
  - key: Locale
    type: string
    label: "Locale"
    group: localization
    default: "en_US"
    required: true
  - key: Keyboard
    type: string
    label: "Keyboard layout"
    group: localization
    default: "english-us"
    required: true
  - key: Timezone
    type: string
    label: "Timezone"
    group: localization
    default: "UTC"
    required: true
    placeholder: "Europe/Berlin"
  - key: Hostname
    type: string
    label: "Hostname"
    group: network
    help: "Leave empty to use the hostname from the host entry."
  - key: Username
    type: string
    label: "Username"
    group: users
    required: true
  - key: PasswordHash
    type: password
    label: "Password hash"
    group: users
    required: true
    help: "Crypted hash, e.g. from: mkpasswd -m sha-512"
  - key: Packages
    type: list
    label: "Additional packages"
    group: packages
detection:
  volume_id_patterns: ["openSUSE*"]
  files: ["boot/x86_64/loader/linux"]
boot:
  pxe:
    kernel: boot/x86_64/loader/linux
    initrd: [boot/x86_64/loader/initrd]
    cmdline: "install={{ .ISOURL }} autoyast={{ .AnswerFileURL }}"
  http_boot:
    kernel: boot/x86_64/loader/linux
    initrd: [boot/x86_64/loader/initrd]
    cmdline: "install={{ .ISOURL }} autoyast={{ .AnswerFileURL }}"
notes: >
  AutoYaST-based installation for Leap and Tumbleweed DVD ISOs. Agama
  (the new installer) support will be added as its unattended interface
  stabilizes.
