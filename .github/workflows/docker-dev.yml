name: Docker dev build

# Manually triggered only: builds the container image, smoke-tests it
# (start container, probe the health endpoint), and publishes it as
# ghcr.io/kreuzbube88/helboot:dev for testing.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kreuzbube88/helboot

jobs:
  build-dev:
    name: Build, smoke-test and push :dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set dev version string
        run: echo "DEV_VERSION=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:dev
          build-args: |
            VERSION=${{ env.DEV_VERSION }}

      - name: Smoke test container
        run: |
          docker run -d --name helboot-dev -p 8080:8080 "$IMAGE:dev"
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "::error::container did not become healthy"
            docker logs helboot-dev
            exit 1
          fi
          body=$(curl -fsS http://127.0.0.1:8080/api/v1/health)
          echo "health: $body"
          echo "$body" | grep -q '"status":"ok"'
          echo "$body" | grep -q "$DEV_VERSION"
          # Setup wizard must be reachable on a fresh container.
          curl -fsS http://127.0.0.1:8080/api/v1/setup/status | grep -q '"completed":false'
          docker logs helboot-dev
          docker rm -f helboot-dev

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push :dev image
        run: docker push "$IMAGE:dev"

      - name: Summary
        run: |
          {
            echo "## Dev image published"
            echo ""
            echo "- Image: \`$IMAGE:dev\`"
            echo "- Version: \`$DEV_VERSION\`"
            echo "- Pull: \`docker pull $IMAGE:dev\`"
          } >> "$GITHUB_STEP_SUMMARY"
